name: build

on:
  push:
    branches:
    - main
    - f/*
    - fix/*
    paths-ignore:
      - "**.md"
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**.md"

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
          cache: true
          cache-dependency-path: '**/packages.lock.json'
      - name: Build
        run: dotnet build -c Release
      - name: Test
        run: dotnet test --solution NKZSoft.FluentResults.Extensions.Functional.sln --configuration Release --no-build --verbosity normal --coverage --coverage-output-format cobertura --results-directory ./coverage
      - name: Generate coverage report
        uses: danielpalme/ReportGenerator-GitHub-Action@5.5.3
        with:
          reports: 'coverage/*.cobertura.xml'
          targetdir: 'coverage/result'
          reporttypes: 'Cobertura;MarkdownSummaryGithub;Badges'
      - name: Publish Coverage Badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        run: |
          set -euo pipefail

          git fetch origin badges || true

          badge_worktree="$(mktemp -d)"

          if git ls-remote --exit-code --heads origin badges >/dev/null 2>&1; then
            git worktree add -B badges "$badge_worktree" origin/badges
          else
            git worktree add -b badges "$badge_worktree"
          fi

          mkdir -p "$badge_worktree/coverage"
          cp coverage/result/badge_linecoverage.svg "$badge_worktree/coverage/badge_linecoverage.svg"

          pushd "$badge_worktree"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add coverage/badge_linecoverage.svg

          if git diff --cached --quiet; then
            echo "No badge data changes to publish"
            popd
            git worktree remove "$badge_worktree" --force
            exit 0
          fi

          git commit -m "docs(badge): update coverage badge data"
          git push origin badges
          popd

          git worktree remove "$badge_worktree" --force
      - name: Add Coverage PR Comment
        uses: marocchino/sticky-pull-request-comment@v2
        if: github.event_name == 'pull_request'
        with:
          recreate: true
          path: coverage/result/SummaryGithub.md
